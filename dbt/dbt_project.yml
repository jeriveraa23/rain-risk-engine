name: 'alerto'
version: '1.0.0'
config-version: 2

profile: 'alerto'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
packages-install-path: /tmp/dbt_packages
clean-targets:
  - "target"
  - "dbt_packages"

models:
  alerto:
    silver:
      +materialized: incremental
      +schema: silver
    gold:
      +schema: gold