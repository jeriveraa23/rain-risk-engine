version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: alerto_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: alerto_backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file:
      - .env
  
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: alerto_frontend
    restart: always
    ports:
      - "3000:3000"

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: ../docker/airflow.Dockerfile
    container_name: alerto_airflow_web
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    env_file:
      - .env
    command: webserver

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: ../docker/airflow.Dockerfile
    container_name: alerto_airflow_scheduler
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    command: scheduler

  dbt:
    build:
      context: ./dbt
      dockerfile: ../docker/dbt.Dockerfile
    container_name: alerto_dbt
    depends_on:
      - postgres
    env_file:
      - .env

volumes:
  postgres_data: